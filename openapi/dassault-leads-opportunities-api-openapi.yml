components:
  schemas:
    406_leads-opportunities:
      type: object
      properties:
        info:
          type: object
          properties:
            success:
              type: boolean
              description: status of the operation
            statusCode:
              type: integer
              description: HTTP status code
            timeStamp:
              type: string
              description: timestamp of the operation
            traceId:
              type: string
              description: trace id to be provided for technical investigations.
        error:
          type: object
          properties:
            code:
              type: string
              description: error code
            message:
              type: string
              description: error message
        data:
          type: object
          properties:
            partnerLeadOpportunityId:
              type: 'null'
            dsLeadOpportunityId:
              type: 'null'
            action:
              type: 'null'
    post_leads-opportunities_search:
      description: Request body schema for searching leads-opportunities
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              modifiedDate:
                type: object
                description: 'Search criterion on the last modification date/time of the leads-opportunities.


                  The maximum time window allowed for the search is **1 week / 7 days** (between `fromDate`and `toDate`, calculated time to time).

                  Both lower (`fromDate`) and upper (`toDate`) bounds need to be provided as no implict range calculation is done.

                  Lower and upper bounds need to be consistent : `fromDate` has to be anterior to `toDate`.'
                properties:
                  fromDate:
                    type: string
                    format: date-time
                    description: 'Lower bound to be considererd for the last modification date/time of the leads-opportunities.

                      This property represents a timestamp in UTC format, following the ISO 8601 standard.

                      All date-time values must be provided in Coordinated Universal Time (UTC).'
                    example: '2024-08-01T14:30:00Z'
                  toDate:
                    type: string
                    format: date-time
                    description: 'Upper bound to be considererd for the last modification date/time of the leads-opportunities.

                      This property represents a timestamp in UTC format, following the ISO 8601 standard.

                      All date-time values must be provided in Coordinated Universal Time (UTC).'
                    example: '2024-08-08T08:30:00Z'
                required:
                - fromDate
                - toDate
              partnerLeadOpportunityId:
                type:
                - array
                - string
