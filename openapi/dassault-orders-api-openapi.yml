                    - type: errors:3dx:resourceNotFound
                      title: Not found
                      errors:
                      - detail: Change your parameters to get results
                        pointer: '#'
        '429':
          description: Too many Requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/429_too_many_requests'
