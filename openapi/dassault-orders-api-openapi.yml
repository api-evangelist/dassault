        - creationDateTime
        - currency
    order_line:
      type: object
      description: 'Details of License Charge Condition.

        This object is also interchangably called as Line Item.

        '
      properties:
        sequenceNumber:
          type: integer
          description: 'The sequence number used to identify the line item.

            It is an integer autogenerated by system, between 1 and 999.

            '
          minimum: 1
          maximum: 999
          example: 1
        lineGroup:
          type: string
          description: 'Unique identifier of license charge condition. This is used to group together the Installed Base sub-lines.

            '
          maxLength: 15
          example: SBL0001234567
        onlineInstanceSeatId:
          $ref: '#/components/schemas/online_instance_seat_id'
        orderType:
          $ref: '#/components/schemas/order_type'
        usageScope:
          type: string
          description: 'Defines the geographical or territorial scope in which the product can be used,

            as specified in the associated agreement details. This may refer to a region (e.g., GEO)

            or a specific country.

            '
          maxLength: 80
          example: GEO EMEA
        promotion:
          type: object
          description: 'Promotion information.

            This object contains information about the promotion applied to the order.

            The promotion object contains information about the promotion, including its name, ID, and combination of one or more products.

            '
          properties:
            id:
              type: string
              description: 'Unique identifier of the promotion.

                The ID is a 15-character string that starts with "PAO" followed by a sequence of numbers.

                The numbers are generated by the system and are used to identify the promotion.

                The ID is unique within the instance and is used to track and manage the promotion.

                '
              maxLength: 10
              example: PAO0000111
            name:
              type: string
              description: 'Name of the promotion.

                The name is a human-readable description of the promotion.

                The name is used to identify the promotion and to display it to the user.

                '
              maxLength: 100
              example: 3DEXPERIENCE for small and medium business
            combination:
              type: string
              description: 'The human-readable name of the combination that represents specific grouping of products.

                The combination is usually one or more products from one or multiple portfolios.

                A combination can be thought of as a "bundle" of products that are sold together, or as a "package" of products that are related in some way.

                '
              maxLength: 100
              example: Collaborative Design & Engineering Learning @Home
        waiver:
          type: object
          description: 'Waiver information for the license charge.

            It can be either of `duration` or `endDate`.

            '
          properties:
            duration:
              type: integer
              description: 'The number of months the order is eligible for free or discount.

                The duration is usually a number of months.

                '
              example: 1
            endDate:
              type: string
              description: 'The date untill which the order is eligible for free or discount.


                Format: ISO 8601 (e.g., `2025-05-30`)

                '
              format: date
              example: '2025-05-30'
          oneOf:
          - required:
            - duration
          - required:
            - endDate
        licenseChargeBreakdown:
          type: array
          items:
            $ref: '#/components/schemas/order_sub_line'
    401_basic_unauthorized:
      type: object
      description: Unauthorized
      properties:
        message:
          type: string
      required:
      - message
    ds_received_po_date:
      type: string
      description: Date when the order was received by Dassault Systèmes, in ISO 8601 format (YYYY-MM-DD).
      format: date
      example: '2025-05-21'
    order_processing_status:
      type: string
      description: Current processing status of the order.
      enum:
      - Cancelled
      - Claim to be Managed
      - Consent Refused
      - Discarded
      - Draft
      - Forecast
      - On Hold
      - Quote
      - Draft by VAR
      - Finance Approved
      - Finance Refused
      - Pending Consent
      - Pending Customer Consent
      - Quote Rejected
      - Sales Approved
      - Sent Back to Finance
      - Sent Back to Sales
      - Sent Back to Quote
      - Sent Back to VAR
      - Sent Back to VAR Central Admin
      - Sent to Credit Manager
      - Sent to DSx.Finance
      - Submitted to Sales
      - Submitted to VAR Central Admin
      x-enumDescriptions:
        Cancelled: The order has been cancelled and is no longer valid.
        Claim to be Managed: The order is being claimed by a different entity for management.
        Consent Refused: The Final Customer has refused to provide consent for the order.
        Discarded: The order has been discarded and is no longer valid.
        Draft: The order is in draft mode and has not been submitted.
        Forecast: Status for renewal which are created more than 90 days before their start date, renewal is kept in Forecast status until system applies the price increase, then moved to Draft or Quote.
        On Hold: Users can put a renewal on-hold temporarily to prevent automatic finalization.
        Quote: The order is in the quoting phase and has not been submitted.
        Draft by VAR: The order is in draft mode and has been created by a Value Added Reseller (VAR).
        Finance Approved: The order has been approved by the Finance Department.
        Finance Refused: The order has been refused by the Finance Department.
        Pending Consent: The order is waiting for Final Customer consent.
        Pending Customer Consent: The order is waiting for Final Customer consent and has not been submitted.
        Quote Rejected: The quote for the order has been rejected.
        Sales Approved: The order has been approved by the Sales Department.
        Sent Back to Finance: The order has been sent back to the Finance Department for further processing.
        Sent Back to Sales: The order has been sent back to the Sales Department for further processing.
        Sent Back to Quote: The order has been sent back to the quoting phase for further review or modification.
        Sent Back to VAR: The order has been sent back to the Value Added Reseller (VAR) for further processing.
        Sent Back to VAR Central Admin: The order has been sent back to the VAR central administration for further processing.
        Sent to Credit Manager: The order has been sent to the credit manager for further processing.
        Sent to DSx.Finance: The order has been sent to the Finance Department for further processing.
        Submitted to Sales: The order has been submitted to the Sales Department for further processing.
        Submitted to VAR Central Admin: The order has been submitted to the VAR central administration for further processing.
      example: Sales Approved
    date_time_to:
      type: string
      description: 'This property represents a timestamp in UTC format, following the ISO 8601 standard.

        All date-time values must be provided in Coordinated Universal Time (UTC).

        If the `from` timestamp is specified, this value must be later than `from`.

        If not provided, the system will automatically calculate this value by adding the maximum number of days specified for the time range defined for the parent search criteria.

        '
      format: date-time
      example: '2024-05-22T14:30:00Z'
