    online_instance_seat_id:
      type: string
      description: 'Unique identifier assigned to a 3DEXPERIENCE platform instance.

        It is used to identify a specific instance of the platform, which can be accessed through the cloud.

        This identifier is also referred to as the **Online Instance ID**.

        Additionally, it is also used as the **Seat ID** to identify a user''s access to the instance.

        The Seat ID is used to manage user licenses, authenticate users, and track user activity within the instance.

        The Online Instance ID/Seat ID is a combination of letters and numbers.

        '
      maxLength: 15
      example: R1122334455667
    recurring_charge_billing_cycle:
      type: string
      description: 'Identifies how often invoices are sent for ALC and ASC licenses. In the event of prorating (to an anniversary date, in the first month, or in the first quarter) or cancellation and refund or overpayment, the prorate calculation is based on 30 day months.

        '
      enum:
      - Calendar Month
      - Calendar Quarter
      - Calendar Semester
      - Calendar Year
      - Full At Date
      - Immediate
      - Rolling Month 360
      - Rolling Quarter 360
      - Rolling Semester 360
      - Rolling Year 360
      x-enumDescriptions:
        Calendar Month: bill recurring license charges through the end of the current calendar month and for full month periods thereafter (or until indicated anniversary date if earlier)
        Calendar Quarter: bill recurring license charges through the end of the current calendar quarter and for full 3 month periods thereafter (or until indicated anniversary date if earlier)
        Calendar Semester: bill recurring license charges through the end of the current semester and for full 6 month periods thereafter (or until indicated anniversary date if earlier)
        Calendar Year: bill recurring license charges through the end of the current calendar year and for full 12 month periods thereafter (or until indicated anniversary date if earlier)
        Full At Date: bill recurring license charges for a 12-month period (or until indicated anniversary date if earlier) taking into consideration any start dates contained in the PO. If multiple durations (in contrast to quantity) of a recurrent license charge are ordered, they are invoiced at up front rather than on an annual basis. For example, if a PO is for two years of ALC, the two years are invoiced upfront at the start date rather than year one following order completion and year two the next year.
        Immediate: bill is generated by DS at the PO approval date for the full amount of the order not taking into consideration any license start dates contained in the PO. For example, if a PO is for two years of ALC, the two years are invoiced upfront at PO approval date.
        Rolling Month 360: bill recurring license charges from the start date through start date plus one month duration (or until indicated end date if earlier).
        Rolling Quarter 360: bill recurring license charges from the start date through start date plus 3 months duration (or until indicated end date if earlier).
        Rolling Semester 360: bill recurring license charges from the start date through start date plus 6 months duration (or until indicated end date if earlier).
        Rolling Year 360: bill recurring license charges from the start date through start date plus 12 months (or until indicated end date if earlier). For example, if PO is for 2 years of ALC with a start date February 1st, the 2 invoicing periods will be from February 1st to January 31st.
      example: Calendar Year
    sub_order_type:
      type: string
      description: sub Order Type
      enum:
      - Change of Channel
      - Change of VAR
      - EPP Training
      - Evaluation License
      - Transfer License
      - New License
      - One Time Fee
      - License Renewal
      - Stop (NO Parallel Use)
      - Stop - Transform
      - Stop License
      - Stop of PU
      - Stop & Parallel use
      - Suspension
      - Suspension Reinstatement
      - TOS Reinstatement
      - Termination Of Support
      - Transfer without Support
      - VAR Use
      x-enumDescriptions:
        Change of Channel: Changing customer coverage from direct to indirect or vice versa.
        Change of VAR: Changing the Value-Added Reseller (VAR) for an existing order.
        EPP Training: Training related to EPP (Enterprise Productivity Portfolio).
        Evaluation License: License issued temporarily for evaluation purposes.
        Transfer License: Transferring licenses between different companies.
        New License: Fresh order that does not involve any migration, renewal, or upgrade.
        One Time Fee: Fee charged for a one-time service or transaction.
        License Renewal: Extending an existing license.
        Stop (NO Parallel Use): Discontinuing an existing license with no parallel use
        Stop - Transform: Discontinuing an existing license with a shift to a transformed model or product.
        Stop License: Discontinuing an existing license.
        Stop of PU: Discontinuing an existing PU  license.
        Stop & Parallel use: Discontinuing an existing license with parallel use
        Suspension: Temporarily halting the license or support services.
        Suspension Reinstatement: Reinstating a suspended license or support services.
        TOS Reinstatement: Reinstating terms of service.
        Termination Of Support: Ending the support of a product or service.
        Transfer without Support: Transferring licenses without support.
        VAR Use: Orders associated with Value-Added Resellers (VAR).
      example: New License
    product_type:
      type: string
      description: Type of the product.
      enum:
      - Add-On
      - Auxiliary
      - Casual Named User
      - Configuration
      - Enterprise
      - Machine Based
      - Migration Path
      - Named User
      - Offer
      - Package
      - Service
      - Shareable
      - Single Add-On
      - System
      - Token-Based
      x-enumDescriptions:
        Add-On: An additional feature or component that enhances the functionality of a product.
        Auxiliary: A supplementary product or service that supports the primary product.
        Casual Named User: A type of user license that allows for occasional or infrequent use of a product.
        Configuration: A specific setup or arrangement of a product's features or components.
        Enterprise: A product or service designed for large-scale or enterprise-level use.
        Machine Based: A product or service that is licensed or used on a machine or device.
        Migration Path: A product or service that helps customers transition from one product to another.
        Named User: A type of user license that allows for regular or frequent use of a product by a specific individual.
        Offer: A product or service that is being promoted or offered as a special deal.
        Package: A collection of products or services that are bundled together for sale.
        Service: A product or service that provides support or assistance to customers.
        Shareable: A product or service that can be shared among multiple users or devices.
        Single Add-On: A single additional feature or component that enhances the functionality of a product.
        System: A product or service that is designed to work as a complete system or solution.
        Token-Based: A product or service that uses tokens or other forms of authentication to manage access.
      example: Named User
