                          endDate: '2025-09-15'
                        licenseChargeBreakdown:
                        - sequenceNumber: 1
                          installedBaseNumber: LN00012345678
                          subOrderType: New License
                          revenueType: ALC
                          portfolio: CATIA
                          release: 3DEXPERIENCE R2025x
                          product:
                            trigram: ABC
                            type: Named User
                            number: 1AB-ABC
                            name: Generic Product Standard with Cloud Services
                            dsOffering: Licensed Program
                          quantity: 2
