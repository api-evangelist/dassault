        portfolio:
          type: string
          description: 'The portfolio to which the product being ordered belongs.

            This field identifies the specific product family or category to which the ordered product belongs.

            For example, a product might belong to a portfolio such as "CATIA", "ENOVIA", or "SIMULIA".

            '
          maxLength: 50
