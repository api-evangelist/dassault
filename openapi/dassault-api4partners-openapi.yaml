        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/200_price-lists_search'
              examples:
                successful_priceLists_search:
                  summary: Successful price list search
                  description: >-
                    Example of a successful price list search request that
                    returns multiple price lists for different countries.
                  value:
                    data:
                      - countryCode: BLZ
                        countryName: Belize
                        priceLists:
                          - id: 9
                            name: LATAM South Price List
                            currency: USD
                            hasFuturePriceList: false
                            effectiveDate: 'null'
                      - countryCode: CAN
                        countryName: Canada
                        priceLists:
                          - id: 3
                            name: Canada Price List
                            currency: CAD
                            hasFuturePriceList: false
                            effectiveDate: '2025-09-12'
                      - countryCode: HND
                        countryName: Honduras
                        priceLists:
                          - id: 9
                            name: LATAM South Price List
                            currency: USD
                            hasFuturePriceList: false
                            effectiveDate: 'null'
                    info:
                      success: true
                      statusCode: 200
                      estimatedSearchCount: 3
                successful_priceLists_search_noResult:
                  summary: Successful price list search with no results
                  description: >-
                    Example of a successful price list search request that
                    returns no results, indicating no matching price lists.
                  value:
                    data: []
                    info:
                      success: true
                      statusCode: 200
                      estimatedSearchCount: 0
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/401_basic_unauthorized'
              examples:
                401_missing-apikey:
                  summary: Service response in case of missing APIKEY.
                  description: Basic Service response in case of missing APIKEY in request
                  value:
                    message: Missing API key in request
        '403':
          description: Forbidden
          content:
