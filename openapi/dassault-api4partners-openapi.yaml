openapi: 3.1.1
info:
  title: APIs for Dassault Systèmes Partners
  description: APIs exposed by Dassault Systèmes to its partners and resellers.
  version: 0.10.0
  license:
    name: Dassault Systèmes 2025
    url: https://www.3ds.com/
  x-logo:
    url: https://www.3ds.com/assets/3ds-navigation/3DS_corporate-logo_blue.svg
    altText: Dassault Systèmes
    backgroundColor: '#FFFFFF'
servers:
  - url: https://apigw-prd.3ds.com
    description: Main (production) server
  - url: https://apigw-ppt.3ds.com
    description: Server for development by Partners (Non Production)
  - url: https://apigw-qal.3ds.com
    description: Server for Quality Assurance Testing (Non Production)
  - url: https://apigw-ptd.3ds.com
    description: Server for preprod validation (Non Production)
  - url: https://apigw-ppd.3ds.com
    description: Server for postprod validation (Non Production)
security:
  - ApiKeyAuth: []
tags:
  - name: orders
    description: >
      This section defines the operations related to orders, including the
      creation, management, and fulfillment of orders.


      It provides a comprehensive overview of the order lifecycle, from initial
      request to final delivery.


      The operations in this section are designed to support the efficient and
      effective management of orders, ensuring that customers receive their
      products or services in a timely and satisfactory manner.


      The following operations are included in this section:


      * Searching Orders

      * Getting Order Details
  - name: price-lists
    description: >
      This section defines all the operations related to price lists, including
      the search of price lists for a specfic partner.
  - name: accreditations
    description: >
      This section defines all the operations related to accreditations,
      including the search of accreditations for a specfic partner.
  - name: apikeys
    description: >
      This section defines the operations related to API keys . 


      Current API key management still requires some interaction with Dassault
      Systèmes Information System (IS) team.

      This process will likely be updated in the future to provide more autonomy
      and reactivity on partner side. 


      Below is the description of the process when a partner is onboarded on
      APIForPartners program : 


      1. Dassault Systèmes IS team will initialize an API key and communicate it
      to partner Admin through a secured channel :

          - **Recommendation is to use a 1-1 discussion between Partner Admin and Dassault Systèmes IS person in charge within the dedicated 3DSwym Community**
          - **Do NOT use email or any unsecured communication channel or with wider audience**

      2. Partner Admin will then use this initial APIKEY value to authenticate
      and generate a new API key using the API  


      3. Partner admin will communicate back (within same secured channel) to
      Dassault Systèmes IS person in charge the **hashed_key** attributed from
      the API (NOT the API key itself)

          - The Hash operation is NOT reversible, so Dassault Systèmes will NOT have knowledge about partner API key. 
          - Partner Admin must store securely the generated API key (same level of confidentiality as a password)

      4. Dassault Systèmes IS team will update API Gateway configuration with
      the new API key (in practice with the hash value provided) and inform
      Partner when it is ready to use.


      5. Partner can then use this newly generated APIKEY to interact with all
      the available APIs.


      For the case of revocation and request of a new API key, steps 2 to 5 have
      to be followed.
  - name: leads-opportunities
    description: >
      This section defines the operations related to leads and opportunities for
      sales pipeline management.


      These ressources are managed with 'MySalesPipeline' application which
      implements Dassault Systèmes sales process called 'LEVERAGE' in accordance
      with the VALUE Engagement framework.

      LEVERAGE is an acronym that stands for Listen, Explore, Validate,
      Establish, Reach AGreement & Experience.
  - name: portfolio-items
    description: >
      This section defines the operations related to sales portfolio-items.


      The portfolio items are used in the definition of leads-opportunities in
      'MySalesPipeline' application.
paths:
  /order/api4partners/v0/orders/search:
    post:
      summary: Search Orders using various filters
      description: >
        Searches for orders based on various filter criteria such as creation
        date, booking date, last modified date, and more.

        Supports pagination through `skip` and `top` query parameters.
      tags:
        - orders
      operationId: searchOrders
      parameters:
        - name: skip
          in: query
          description: >
            The number of records to skip in the result set.  

            Use this for paginating through results. Defaults to 0 if not
            specified.

            For example, `skip=20` will skip the first 20 records.
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: top
          in: query
          description: >
            The maximum number of records to return in the response.  

            Use this to limit the size of the result set. Defaults to 10 if not
            specified.

            For example, `top=10` will return up to 10 records starting from the
            position defined by `skip`.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
      requestBody:
        description: >
          A JSON object specifying filter criteria for retrieving matching
          orders.


          The request must include at least one of the following sub-objects: 

          - `creationDateTime`

          - `bookingDateTime`

          - `lastUpdateDateTime`

          - `installedBaseNumber`

          - `onlineInstanceSeatId`

          - `billToPoReferences`


          These will be combined using an AND operator if more than one is
          provided.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/orders_search_req'
            examples:
              basicSearchSingleCriteria:
                summary: >-
                  Sample request body for searching orders using a single
                  criterion
                description: >
                  This example demonstrates how to search for orders using the
                  `creationDateTime` criterion.

                  If the `to` value is not provided under `creationDateTime`, it
                  is implicitly set to either 7 days after the `from` timestamp
                  or the current time—whichever is earlier.


                  This JSON payload retrieves all orders created between
                  `01-April-2025 1:30 AM UTC` and `08-April-2025 1:30 AM UTC`.
                value:
                  creationDateTime:
                    from: '2025-04-01T01:30:00Z'
              advancedSearchMultipleCriteria:
                summary: >-
                  Sample request body for searching orders using multiple
                  criteria
                description: >
                  This example demonstrates how to search for orders using
                  multiple criteria:

                  - `creationDateTime`

                  - `lastUpdateDateTime`

                  - `installedBaseNumber`

                  - `transactionType`


                  If the `to` value is not provided under `creationDateTime`, it
                  is implicitly set to either 7 days after the `from` timestamp
                  or the current time—whichever is earlier.


                  If the `from` value is not provided under
                  `lastUpdateDateTime`, it is implicitly set to 3 days before
                  the `to` timestamp.


                  This JSON payload searches for all `Renewal Orders` that:

                  - Were created between `01-April-2025 1:30 AM UTC` and
                  `08-April-2025 1:30 AM UTC`

                  - Were modified between `22-May-2025 7:45 PM UTC` and
                  `25-May-2025 7:45 PM UTC`

                  - Have the InstalledBase Number `LN00001234567`
                value:
                  creationDateTime:
                    from: '2025-04-01T01:30:00Z'
                  lastUpdateDateTime:
                    to: '2025-05-25T19:45:00Z'
                  installedBaseNumber: LN00001234567
                  transactionType: RN
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/200_post_orders_search'
              examples:
                successful_ordersSearch_OneResult:
                  summary: Sample successful basic Search for orders
                  description: >-
                    Sample successful basic search for orders with only 1
                    result.
                  value:
                    data:
                      - transaction:
                          id: PO_A123456789
                          type: PO
                          status: Sent to DSx.Finance
                          description: XYZ Company Order 50 products
                        creationDateTime: '2024-05-21T14:30:00Z'
                        dsRecievedPoDate: '2024-05-21'
                        bookingDateTime: '2024-05-29T18:00:00Z'
                        currency: USD
                        onlineConsentStatus: Not Applicable
                        billToSalesRepresentative: DOE, Jane
                        billToPoReference: EXAMPLE-CORP-20250518
                        billToSite:
                          id: '100012345678901'
                          name: Example Corporation
                          localName: 示例公司
                          locationId: 1
                        soldToSite:
                          id: '200012345678901'
                          name: Foobar Inc
                          localName: फ़ूबार इंक
                          locationId: 2
                        businessUnit:
                          id: BU001
                          name: Corporate Sales Unit A
                          localTimezone: CET
                    info:
                      success: true
                      statusCode: 200
                      estimatedSearchCount: 1
                200_ordersSearch_No-Result:
                  summary: Sample successful Search for orders without any results
                  description: Sample successful Search for orders without any results
                  value:
                    data: []
                    info:
                      success: true
                      statusCode: 200
                      estimatedSearchCount: 0
        '400':
          description: Bad request, invalid input.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/400_post_orders_search'
              examples:
                failedOrderSearch_BadRequest:
                  summary: Example response for a bad request
                  description: >
                    This example shows the response returned when a bad request
                    is made, such as when no search criteria are provided.
                  value:
                    data: []
                    info:
                      success: false
                      statusCode: 400
                      estimatedSearchCount: 0
                    error:
                      - type: errors:3dx:invalidRequest
                        title: Missing required search criteria
                        errors:
                          - detail: >-
                              Please specify at least one search criterion.
                              Valid options include: `creationDateTime`,
                              `bookingDateTime`, `lastUpdateDateTime`,
                              `installedBaseNumber`, `onlineInstanceSeatId`,
                              `billToPoReferences`.
                            pointer: '#'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/401_basic_unauthorized'
              examples:
                401_missing-apikey:
                  summary: Service response in case of missing APIKEY.
                  description: Basic Service response in case of missing APIKEY in request
                  value:
                    message: Missing API key in request
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/403_basic_forbidden'
              examples:
                403_forbidden:
                  summary: Access Forbidden
                  description: >-
                    Access Forbidden. Typical reason could be usage of invalid
                    API-KEY or a valid one but for a scope on which access has
                    not been granted by 3DS.
                  value:
                    message: API Consumer Not allowed
        '429':
          description: Too many Requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/429_too_many_requests'
              examples:
                429_too_many_requests:
                  summary: Too many Requests
                  description: >-
                    The service cannot handle the request as too many have been
                    received.
                  value:
                    message: Too many requests, please try again later
  /order/api4partners/v0/orders/{id}:
