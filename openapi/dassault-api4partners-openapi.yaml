  /order/api4partners/v0/accreditations/search:
    get:
      summary: Retrieve Accreditations
      description: >
        Retrieves accreditations associated with the authenticated user.
        Supports pagination with `skip` and `top` parameters.
      tags:
        - accreditations
      operationId: searchAccreditations
      parameters:
        - name: skip
          in: query
          description: Number of items to skip in the search results.
          schema:
            type: integer
            minimum: 0
            default: 0
          example: 0
        - name: top
          in: query
          description: Maximum number of items to retrieve in search results.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 100
          example: 100
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/200_accreditations_search'
              examples:
                successful_accreditations_search_threeResult:
                  summary: Successful accreditation search example
                  description: >-
                    Example of a successful accreditation search request that
                    returns multiple results, demonstrating top matches.
                  value:
                    data:
                      - id: PRTF008
                        name: Support & Services Offering
                        accreditationType: Portfolio
                      - id: PRTF063
                        name: Public Cloud 3DEXPERIENCE WORKS
                        accreditationType: Portfolio
                      - id: IPE00041462
                        name: 18-Sub-system Level Structural Validation
                        accreditationType: Industry Process Experience
                        deploymentType: On Premise
                        industrySolutionExperience:
                          id: ISE00005355
                          name: Co-Design to Target
                        solutionRelease:
                          id: REL00000055
                          name: 3DEXPERIENCE R2025x
                        industry:
                          id: IND000005
                          name: Aerospace & Defense
                    info:
                      success: true
                      statusCode: 200
                      estimatedSearchCount: 3
                successful_accreditations_search_noResult:
                  summary: Successful accreditation search with no results
                  description: >-
                    Example of a successful accreditation search request that
                    returns no results, indicating no matching accreditations.
                  value:
                    data: []
                    info:
                      success: true
                      statusCode: 200
                      estimatedSearchCount: 0
        '400':
          description: Bad request, invalid input.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/400_accreditations_search'
              examples:
                failedAccreditationSearch_BadRequest_topOutsideRange:
                  summary: Top query parameter is outside the allowed ranged
                  description: >
                    Response returned when the top parameter exceeds the allowed
                    range.
                  value:
                    data: []
                    info:
                      success: false
                      statusCode: 400
                      estimatedSearchCount: 0
                    error:
                      - type: errors:3dx:invalidRequest
                        title: Bad Request
                        errors:
                          - detail: >-
                              Invalid pagination parameter. It must be a
                              positive natural number between 1 and 100.
                            pointer: '#/Top'
                failedAccreditationSearch_BadRequest_skipNegativeNumber:
                  summary: skip query parameter is a negative number
                  description: >
                    This example shows the response returned when a bad request
                    is made, such as when the skip parameter is a negative
                    number
                  value:
                    data: []
                    info:
                      success: false
                      statusCode: 400
                      estimatedSearchCount: 0
                    error:
                      - type: errors:3dx:invalidRequest
                        title: Bad Request
                        errors:
                          - detail: >-
                              Invalid pagination parameter. It must be a
                              positive whole number.
                            pointer: '#/Skip'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/401_basic_unauthorized'
              examples:
                401_missing-apikey:
                  summary: Service response in case of missing APIKEY.
                  description: Basic Service response in case of missing APIKEY in request
                  value:
                    message: Missing API key in request
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/403_basic_forbidden'
              examples:
                403_forbidden:
                  summary: Access Forbidden
                  description: >-
                    Access Forbidden. Typical reason could be usage of invalid
                    API-KEY or a valid one but for a scope on which access has
                    not been granted by 3DS.
                  value:
                    message: API Consumer Not allowed
        '429':
          description: Too many Requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/429_too_many_requests'
              examples:
                429_too_many_requests:
                  summary: Too many Requests
                  description: >-
                    The service cannot handle the request as too many have been
                    received.
                  value:
                    message: Too many requests, please try again later
