aid: dassault
name: Dassault Systèmes
description: Dassault Systèmes provides the 3DEXPERIENCE platform with thousands of
  publicly available REST APIs for product design, simulation, and manufacturing industries.
  The platform covers SolidWorks, CATIA, ENOVIA, and 3D collaboration tools, exposing
  web services across engineering items, manufacturing processes, CAD collaboration,
  project tasks, and partner order management through standardized RESTful endpoints.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/dassault/refs/heads/main/apis.yml
created: '2026-06-13'
modified: '2026-06-13'
specificationVersion: '0.19'
tags:
  - 3DEXPERIENCE
  - PLM
  - Product Lifecycle Management
  - CAD
  - Manufacturing
  - SolidWorks
  - CATIA
  - ENOVIA
  - Engineering
  - 3D Collaboration
apis:
  - name: 3DEXPERIENCE Engineering Web Services
    description: REST API for accessing and managing engineering item resources and
      attributes on the 3DEXPERIENCE platform, including part masters, specifications,
      and engineering BOMs.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://www.3ds.com/support/documentation/developer-guides
    baseURL: https://apigw-prd.3ds.com
    tags:
      - Engineering
      - PLM
      - CAD
      - BOM
    properties:
      - type: Documentation
        url: https://www.3ds.com/support/documentation/developer-guides
      - type: OpenAPI
        url: https://github.com/3ds-cpe-emed/ws3dx-dotnet
  - name: 3DEXPERIENCE Manufacturing Web Services
    description: REST API for managing manufacturing item data, manufacturing BOMs,
      and process plans on the 3DEXPERIENCE platform used in production and factory
      planning.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://www.3ds.com/support/documentation/developer-guides
    baseURL: https://apigw-prd.3ds.com
    tags:
      - Manufacturing
      - PLM
      - Production
      - BOM
    properties:
      - type: Documentation
        url: https://www.3ds.com/support/documentation/developer-guides
  - name: 3DEXPERIENCE CAD Collaboration Web Services
    description: REST API for CAD collaboration and coordination on the 3DEXPERIENCE
      platform, enabling integration with SolidWorks, CATIA, and other CAD tools for
      managing design data and versions.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://www.3ds.com/support/documentation/developer-guides
    baseURL: https://apigw-prd.3ds.com
    tags:
      - CAD
      - SolidWorks
      - CATIA
      - Collaboration
      - Design
    properties:
      - type: Documentation
        url: https://www.3ds.com/support/documentation/developer-guides
  - name: 3DEXPERIENCE Manufacturing Process Web Services
    description: REST API for managing manufacturing processes, process plans, and
      operations on the 3DEXPERIENCE platform, supporting digital manufacturing and
      process simulation workflows.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://www.3ds.com/support/documentation/developer-guides
    baseURL: https://apigw-prd.3ds.com
    tags:
      - Manufacturing
      - Process
      - PLM
      - Simulation
    properties:
      - type: Documentation
        url: https://www.3ds.com/support/documentation/developer-guides
  - name: 3DEXPERIENCE Project Task Web Services
    description: REST API for project management and task handling on the 3DEXPERIENCE
      platform, enabling integration with project schedules, milestones, and team
      assignments within ENOVIA applications.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://www.3ds.com/support/documentation/developer-guides
    baseURL: https://apigw-prd.3ds.com
    tags:
      - Project Management
      - ENOVIA
      - Tasks
      - Collaboration
    properties:
      - type: Documentation
        url: https://www.3ds.com/support/documentation/developer-guides
  - name: 3DEXPERIENCE Issue Web Services
    description: REST API for change and issue tracking on the 3DEXPERIENCE platform,
      supporting engineering change orders, problem reports, and corrective actions
      within the product lifecycle.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://www.3ds.com/support/documentation/developer-guides
    baseURL: https://apigw-prd.3ds.com
    tags:
      - Change Management
      - Issues
      - ENOVIA
      - PLM
    properties:
      - type: Documentation
        url: https://www.3ds.com/support/documentation/developer-guides
  - name: API4Partners
    description: REST API for Dassault Systèmes channel partners to manage orders,
      price lists, accreditations, leads, and portfolio items through the partner
      gateway, using API key authentication.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://partners.3ds.com/docs/0.10.0/
    baseURL: https://apigw-prd.3ds.com
    tags:
      - Partners
      - Orders
      - Sales
      - Pricing
    properties:
      - type: Documentation
        url: https://partners.3ds.com/docs/0.10.0/
